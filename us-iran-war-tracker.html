<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US-Iran War Status Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        h1, h2 { color: #ffffff; }
        .section { margin-bottom: 30px; }
        .event-list { list-style: none; padding: 0; }
        .event-item { background: #1e1e1e; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .event-item a { color: #4da6ff; text-decoration: none; }
        .event-item a:hover { text-decoration: underline; }
        .loading { color: #888; }
        #refresh-timer { font-style: italic; color: #888; }
    </style>
</head>
<body>
    <h1>US-Iran War Status Tracker</h1>
    <p id="refresh-timer">Auto-refreshing in 5 minutes...</p>

    <div class="section">
        <h2>Current Overall Status</h2>
        <div id="status-summary" class="loading">Loading latest summary...</div>
    </div>

    <div class="section">
        <h2>Timeline of Key Events</h2>
        <ul id="event-timeline" class="event-list">
            <li class="loading">Fetching events...</li>
        </ul>
    </div>

    <div class="section">
        <h2>Events in Gulf Countries</h2>
        <ul id="gulf-events" class="event-list">
            <li class="loading">Fetching Gulf-specific events...</li>
        </ul>
    </div>

    <script>
        // RSS feeds to pull from (focused on US-Iran war and Gulf events)
        const feeds = {
            general: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fnews.google.com%2Frss%2Fsearch%3Fq%3DUS%2BIran%2Bwar%2Bstatus%26hl%3Den-US%26gl%3DUS%26ceid%3DUS%3Aen',
            timeline: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fnews.google.com%2Frss%2Fsearch%3Fq%3DUS%2BIran%2Bwar%2Btimeline%26hl%3Den-US%26gl%3DUS%26ceid%3DUS%3Aen',
            gulf: 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fnews.google.com%2Frss%2Fsearch%3Fq%3Devents%2Bin%2BGulf%2Bcountries%2BUS%2BIran%2Bconflict%26hl%3Den-US%26gl%3DUS%26ceid%3DUS%3Aen'
        };

        // Function to fetch and display RSS data
        async function fetchRSS(url, elementId, limit = 10) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                const items = data.items.slice(0, limit);
                const list = document.getElementById(elementId);
                list.innerHTML = '';
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'event-item';
                    li.innerHTML = `<strong>${item.title}</strong><br>${item.pubDate}<br><a href="${item.link}" target="_blank">Read more</a>`;
                    list.appendChild(li);
                });
            } catch (error) {
                document.getElementById(elementId).innerHTML = '<li>Error loading data. Check your connection.</li>';
            }
        }

        // Load all sections
        function loadData() {
            fetchRSS(feeds.general, 'status-summary', 1); // Top summary
            fetchRSS(feeds.timeline, 'event-timeline', 10); // Timeline
            fetchRSS(feeds.gulf, 'gulf-events', 10); // Gulf events
        }

        // Auto-refresh every 5 minutes (300000 ms)
        setInterval(() => {
            loadData();
            document.getElementById('refresh-timer').textContent = 'Just refreshed! Next in 5 minutes...';
        }, 300000);

        // Initial load
        loadData();

        // Countdown timer for refresh
        let timeLeft = 300;
        setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) timeLeft = 300;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('refresh-timer').textContent = `Auto-refreshing in ${minutes}:${seconds < 10 ? '0' : ''}${seconds}...`;
        }, 1000);
    </script>
</body>
</html>
